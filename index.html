<style>
body{margin:0;font-family:Arial;background:#f2f2f2}

header{
background:#111;color:#fff;padding:20px;text-align:center;
font-size:22px;font-weight:bold
}

.filters{
position: sticky;
top: 0;
z-index: 1000;

display:flex;
justify-content:center;
gap:10px;
padding:10px;
background:#fff;
flex-wrap:wrap;

box-shadow: 0 2px 10px rgba(0,0,0,.1);
}

.filters button{
padding:8px 15px;border:none;border-radius:20px;
background:#ddd;cursor:pointer
}

.filters button.active{background:#25D366;color:#fff}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;padding:15px
}

.card{
background:#fff;border-radius:12px;overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,.1);
transition:.2s
}

.card:hover{transform:scale(1.03);
background-color: rgba(212, 210, 210, 0.667);}

.card img{
width:100%;height:200px;object-fit:contain;
background:#f8f8f8;padding:10px
}

.info{padding:10px;text-align:center}

.price{color:#00a650;font-weight:bold}

.desc{font-size:12px;color:#555}

.btn{
display:block;margin-top:10px;padding:10px;
background:#25D366;color:#fff;text-decoration:none;
border-radius:6px
}

.whatsapp-float{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:#fff;
padding:12px 15px;border-radius:50%;
text-decoration:none;box-shadow:0 2px 10px rgba(0,0,0,.2)
}
</style>
</head>

const container=document.getElementById("products");

function renderProducts(filter){
container.innerHTML=products
.filter(p=>filter==="all"||p.category===filter)
.map(p=>{
const message=`Hola! Quiero comprar: ${p.name} ${p.price}`;
const link=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

return `
<div class="card">
<img src="${p.img}">
<div class="info">
<h3>${p.name}</h3>
<p class="price">${p.price}</p>
${p.desc?`<p class="desc">${p.desc}</p>`:""}
<a class="btn" href="${link}" target="_blank">Comprar por WhatsApp </a>
</div>
</div>`;
}).join("");
}

function filterProducts(category,e){
document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");
renderProducts(category);
}
